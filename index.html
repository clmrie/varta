      'Huliaipole':     { lat: 47.6567, lng: 36.2625 }
    };

    function extractLocation(text) {
      // Check most specific (smaller cities) first, then larger ones
      const cityNames = Object.keys(CITY_COORDS);
      // Sort by name length descending so "Kryvyi Rih" matches before "Kyiv"
      cityNames.sort((a, b) => b.length - a.length);
      for (const loc of cityNames) {
        if (text.includes(loc.toLowerCase())) return loc;
      }
      return 'Ukraine';
    }

    function stripHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || '';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      const now = new Date();
      const diffMs = now - d;
      const diffMin = Math.floor(diffMs / 60000);
      if (diffMin < 1) return 'Just now';
      if (diffMin < 60) return `${diffMin}m ago`;
      const diffHr = Math.floor(diffMin / 60);
      if (diffHr < 24) return `${diffHr}h ago`;
      const diffDay = Math.floor(diffHr / 24);
      if (diffDay < 7) return `${diffDay}d ago`;
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    }


    // ==================== FRONTLINE ====================

    async function fetchFrontline() {
      // Try today through 5 days back (data may not be published yet today)
      // Date format in filenames is YYYYMMDD (no hyphens)
      const dates = [];
      for (let i = 0; i <= 5; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        dates.push({ fileDate: `${yyyy}${mm}${dd}`, displayDate: `${yyyy}-${mm}-${dd}` });
      }

      for (const { fileDate, displayDate } of dates) {
        const rawUrl = `https://raw.githubusercontent.com/cyterat/deepstate-map-data/main/data/deepstatemap_data_${fileDate}.geojson`;

        // Try direct fetch first (GitHub raw usually allows CORS)
        try {
          const resp = await fetch(rawUrl, { signal: AbortSignal.timeout(15000) });
          if (resp.ok) {
            const geo = await resp.json();
            return { ok: true, data: geo, date: displayDate };
          }
        } catch (e) { /* try proxies */ }

        // Try CORS proxies
        for (const proxyFn of CORS_PROXIES) {
          try {
            const url = proxyFn(rawUrl);
            const resp = await fetch(url, { signal: AbortSignal.timeout(15000) });
            if (resp.ok) {
              const geo = await resp.json();
              return { ok: true, data: geo, date: displayDate };
            }
          } catch (e) { /* next proxy */ }
        }
      }

      return { ok: false, data: null, date: null };
    }

    function renderFrontlineLayer() {
      if (!state.frontlineData) return;

      if (state.frontlineLayer) {
        state.map.removeLayer(state.frontlineLayer);
      }

      state.frontlineLayer = L.geoJSON(state.frontlineData, {
        style: {
          fillColor: '#8b0000',
          fillOpacity: 0.15,
          color: '#ff2952',
          weight: 3,
          opacity: 0.9,
          dashArray: null
        },
        onEachFeature: (feature, layer) => {
          layer.bindPopup(`
            <div style="font-family:var(--font-mono);font-size:12px;color:#d8e4f0">
              <div style="color:#ff2952;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;font-size:13px">
                ⚠ RUSSIAN-OCCUPIED ZONE
              </div>
              <div style="color:#6a7a8e;font-size:10px;line-height:1.6">
                SRC: DeepStateMap (GitHub)<br>
                DATE: ${state.frontlineDate || '—'}<br>
                TYPE: MultiPolygon boundary<br>
                UPD: Daily @ 03:00 UTC
              </div>
            </div>
          `, { className: 'oblast-popup' });
        }
      });

      if (state.layers.frontline) {
        state.frontlineLayer.addTo(state.map);
      }
    }



    // ==================== LAYER TOGGLES ====================

    function toggleLayer(layerName) {
      state.layers[layerName] = !state.layers[layerName];
      localStorage.setItem(`ukr_layer_${layerName}`, state.layers[layerName]);

      if (layerName === 'frontline') {
        const btn = document.getElementById('toggleFrontline');
        if (state.layers.frontline) {
          btn.classList.add('active');
          if (state.frontlineLayer) state.frontlineLayer.addTo(state.map);
          renderFrontlineLayer();
        } else {
          btn.classList.remove('active');
          if (state.frontlineLayer) state.map.removeLayer(state.frontlineLayer);
        }
      }
    }

    // ==================== UI UPDATES ====================
    function setAlertBannerState(cls) {
      const banner = document.getElementById('alertBanner');
      banner.classList.remove('safe', 'danger', 'checking', 'error');
      banner.classList.add(cls);
    }

    function updateSourceBadges() {
      const container = document.getElementById('sourceBadges');
      const sources = [
        { key: 'alerts', label: 'Alerts' },
        { key: 'news', label: 'Telegram' },
        { key: 'frontline', label: 'DeepState' }
      ];
      container.innerHTML = sources
        .filter(s => state.sourcesStatus[s.key] !== null)
        .map(s => {
          const ok = state.sourcesStatus[s.key];
          return `<span class="source-badge ${ok ? 'ok' : 'fail'}">${s.label} ${ok ? '✓' : '✗'}</span>`;
        }).join('');
    }

    // ==================== FEED ====================
    const SEVERITY_ORDER = { critical: 0, high: 1, medium: 2, low: 3 };

    function renderFeed() {
      const list = document.getElementById('feedList');
      const filtered = (state.activeFilter === 'all'
        ? [...state.incidents]
        : state.incidents.filter(i => i.category === state.activeFilter)
      ).sort((a, b) => {
        // Near-you items always float to top
        const na = isNearMyCities(a) ? 0 : 1;
        const nb = isNearMyCities(b) ? 0 : 1;
        if (na !== nb) return na - nb;
        // Then by severity
        const sa = SEVERITY_ORDER[a.severity] ?? 3;
        const sb = SEVERITY_ORDER[b.severity] ?? 3;
        if (sa !== sb) return sa - sb;
        return new Date(b.pubDate) - new Date(a.pubDate);
      });

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="feed-empty">
            <span class="feed-empty-icon">📭</span>
            <span>No items match this filter</span>
          </div>`;
        document.getElementById('feedCount').textContent = '0 items';
        return;
      }

      document.getElementById('feedCount').textContent =
        `${filtered.length} item${filtered.length !== 1 ? 's' : ''}`;

      const lang = state.lang;
      const titleKey = lang === 'uk' ? 'title_uk' : 'title_en';
      const descKey = lang === 'uk' ? 'description_uk' : 'description_en';

      list.innerHTML = filtered.map((item, i) => {
        const icon = CATEGORY_ICONS[item.category] || CATEGORY_ICONS.unknown;
        const sev = item.severity || 'low';
        const severityClass = `severity-${sev}`;
        const borderClass = `border-${sev}`;
        const globalIdx = state.incidents.indexOf(item);
        const title = item[titleKey] || item.title || '';
        const description = item[descKey] || item.description || '';
        const nearYou = isNearMyCities(item);
        const nearClass = nearYou ? ' near-you' : '';
        const nearBadge = nearYou ? `<span class="near-badge">${lang === 'uk' ? 'ПОРУЧ' : 'NEAR YOU'}</span>` : '';
        const linkHtml = item.link
          ? `<a class="feed-item-link" href="${escapeAttr(item.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${lang === 'uk' ? 'Читати повністю →' : 'Read full article →'}</a>`
          : '';

        return `<div class="feed-item ${borderClass}${nearClass}" data-index="${globalIdx}" onclick="toggleExpand(this)" style="animation-delay:${i * 0.04}s">
          <div class="feed-item-header">
            <span class="feed-category-icon">${icon}</span>
            <span class="feed-item-title">${escapeHtml(title)}</span>
            ${nearBadge}
            <span class="feed-severity ${severityClass}">${sev}</span>
            <span class="feed-item-expand">▸</span>
          </div>
          <div class="feed-item-body">
            <div class="feed-item-description">${escapeHtml(description)}</div>
            ${linkHtml}
          </div>
          <div class="feed-item-meta">
            <span class="feed-item-location">📍 ${escapeHtml(item.location)}</span>
            <span>${escapeHtml(item.time)} · ${escapeHtml(item.source)}</span>
          </div>
        </div>`;
      }).join('');
    }

    function toggleExpand(el) {
      el.classList.toggle('expanded');
    }

    function setFilter(category) {
      state.activeFilter = category;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.category === category);
      });
      renderFeed();
    }

    function setLang(lang) {
      state.lang = lang;
      localStorage.setItem('ukr_lang', lang);
      document.getElementById('langEN').classList.toggle('active', lang === 'en');
      document.getElementById('langUA').classList.toggle('active', lang === 'uk');
      renderFeed();
    }

    // ==================== CITY SETTINGS ====================
    let _pendingCities = [];

    function openCityModal() {
      _pendingCities = [...MY_CITIES];
      renderCityList('');
      document.getElementById('citySearch').value = '';
      document.getElementById('cityModal').classList.add('visible');
      document.getElementById('citySearch').focus();
    }

    function closeCityModal() {
      document.getElementById('cityModal').classList.remove('visible');
    }

    function renderCityList(filter) {
      const list = document.getElementById('cityList');
      const f = filter.toLowerCase();
      const cities = Object.keys(ALL_CITIES).sort();
      list.innerHTML = cities
        .filter(c => !f || c.toLowerCase().includes(f))
        .map(city => {
          const sel = _pendingCities.includes(city);
          return `<div class="city-option ${sel ? 'selected' : ''}" onclick="toggleCity('${city}')">
            <span class="check">${sel ? '✓' : ''}</span>
            <span>${city}</span>
          </div>`;
        }).join('');
    }

    function filterCityList(val) { renderCityList(val); }

    function toggleCity(name) {
      const idx = _pendingCities.indexOf(name);
      if (idx >= 0) _pendingCities.splice(idx, 1);
      else _pendingCities.push(name);
      renderCityList(document.getElementById('citySearch').value);
    }

    function saveCitySelection() {
      if (_pendingCities.length === 0) {
        showToast('Select at least one city');
        return;
      }
      MY_CITIES = [..._pendingCities];
      localStorage.setItem('ukr_my_cities', JSON.stringify(MY_CITIES));
      TARGET_CITIES = getTargetCities();
      closeCityModal();

      // Re-render everything with new cities
      rebuildCityMarkers();
      renderFeed();
      renderIncidentMarkers();
      if (state.oblastAlerts) updateMapAlerts(state.oblastAlerts);
      document.getElementById('alertLocations').textContent = MY_CITIES.join(' · ');
      showToast(`Monitoring: ${MY_CITIES.join(', ')}`);
    }

    function rebuildCityMarkers() {
      // Remove old markers
      state.cityMarkers.forEach(({ marker }) => state.map.removeLayer(marker));
      state.cityMarkers = [];
      // Add new ones
      TARGET_CITIES.forEach(city => {
        const icon = L.divIcon({
          className: '',
          html: `<div class="city-marker" id="marker-${city.name}"><div class="city-marker-inner"></div></div>`,
          iconSize: [28, 28],
          iconAnchor: [14, 14]
        });
        const marker = L.marker([city.lat, city.lng], { icon })
          .addTo(state.map)
          .bindPopup(
            `<div style="text-align:center"><strong>${city.name}</strong><br><span style="font-size:11px;color:#7a8599">Monitored</span></div>`,
            { className: 'city-popup' }
          );
        state.cityMarkers.push({ name: city.name, marker });
      });
    }

    function isNearMyCities(item) {
      if (!item.location || item.location === 'Ukraine') return false;
      const loc = item.location.toLowerCase();
      return MY_CITIES.some(c => c.toLowerCase() === loc);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ==================== NOTIFICATIONS ====================
    async function toggleNotifications() {
      if (!state.notificationsEnabled) {
        if ('Notification' in window) {
          const perm = await Notification.requestPermission();
          if (perm !== 'granted') { showToast('Notification permission denied'); return; }
          state.notificationsEnabled = true;
        } else {
          showToast('Notifications not supported'); return;
        }
      } else {
        state.notificationsEnabled = false;
      }
      localStorage.setItem('ukr_notif', state.notificationsEnabled);
      document.getElementById('notifBtn').classList.toggle('active', state.notificationsEnabled);
    }

    function sendNotification(title, body) {
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(title, { body, tag: 'ukr-alert', requireInteraction: true });
      }
    }

    // ==================== AUDIO ====================
    function toggleAudio() {
      state.audioEnabled = !state.audioEnabled;
      localStorage.setItem('ukr_audio', state.audioEnabled);
      document.getElementById('audioBtn').classList.toggle('active', state.audioEnabled);
      if (state.audioEnabled) {
        if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        playBeep(800, 0.08, 0.1);
      }
    }

    function playAlertSound() {
      if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      playBeep(600, 0.15, 0.3);
      setTimeout(() => playBeep(800, 0.15, 0.3), 200);
      setTimeout(() => playBeep(1000, 0.2, 0.3), 400);
    }

    function playBeep(freq, duration, volume) {
      const ctx = state.audioCtx;
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(volume, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    }

    // ==================== CONTROLS ====================
    function manualRefresh() {
      fetchData();
      resetAutoRefresh();
    }

    function updateInterval() {
      state.interval = parseInt(document.getElementById('intervalSelect').value);
      localStorage.setItem('ukr_interval', state.interval);
      resetAutoRefresh();
    }

    function startAutoRefresh() {
      clearInterval(state.refreshTimer);
      clearInterval(state.countdownTimer);
      if (state.interval > 0) {
        state.nextRefreshAt = Date.now() + state.interval;
        state.refreshTimer = setInterval(() => {
          fetchData();
          state.nextRefreshAt = Date.now() + state.interval;
        }, state.interval);
        state.countdownTimer = setInterval(updateCountdown, 1000);
        updateCountdown();
      } else {
        document.getElementById('nextRefreshText').textContent = '';
      }
    }

    function resetAutoRefresh() { startAutoRefresh(); }

    function updateCountdown() {
      if (!state.nextRefreshAt || state.interval <= 0) return;
      const rem = Math.max(0, Math.ceil((state.nextRefreshAt - Date.now()) / 1000));
      const m = Math.floor(rem / 60);
      const s = rem % 60;
      document.getElementById('nextRefreshText').textContent = `Next: ${m}:${s.toString().padStart(2,'0')}`;
    }

    // ==================== TOAST ====================
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('visible');
      setTimeout(() => t.classList.remove('visible'), 4000);
    }

    // ==================== KEYBOARD SHORTCUTS ====================
    document.addEventListener('keydown', e => {
      if (e.key === 'r' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
        manualRefresh();
      }
    });

    // ==================== START ====================
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
